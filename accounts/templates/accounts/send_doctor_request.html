{% extends "main/doctor_base.html" %}

{% block doctor_content %}

<div class="container mt-4" style="max-width: 600px;">

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">

            <h3 class="fw-bold mb-4">➕ Добавить пациента</h3>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Имя пользователя пациента
                    </label>
                    {{ form.patient_username }}
                </div>

                <button type="submit"
                        class="btn btn-primary rounded-pill px-4">
                    📩 Отправить запрос
                </button>

                <a href="{% url 'doctor_patients' %}"
                   class="btn btn-outline-secondary rounded-pill px-4 ms-2">
                    Отмена
                </a>
            </form>

        </div>
    </div>

</div>

{% endblock %}
